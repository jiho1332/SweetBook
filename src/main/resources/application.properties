spring.application.name=SweetBook-Project
server.port=8081

# ===========================
# ✅ DB 설정
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/sweetbook_db?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
spring.datasource.username=sweetbook
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===========================
# ✅ MyBatis 설정
# ===========================
mybatis.mapper-locations=classpath:/mapper/*.xml
mybatis.type-aliases-package=com.sweetbook.vo

# ===========================
# ✅ JSP 설정
# ===========================
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ===========================
# 🔥 SweetBook API 설정 (핵심)
# ===========================

# 👉 API Base URL (반드시 v1 포함)
sweetbook.api.base-url=https://api-sandbox.sweetbook.com/v1

# 👉 API Key (절대 공백 없이!)
sweetbook.api.key=SBXOPTB0PJFK.NjBbfZJMaHlmYxkjCOOhXEQ6xX4e9LAa

# 👉 내 서버 기본 주소
app.base-url=http://localhost:8081

# ===========================
# 🔧 디버깅 설정
# ===========================

# SQL 로그
logging.level.com.sweetbook.mapper=DEBUG

# API 호출 로그
logging.level.org.springframework.web.client.RestTemplate=DEBUG